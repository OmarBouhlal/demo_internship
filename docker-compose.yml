services:
  # 1. Base de données PostgreSQL
  db:
    image: postgres:15
    container_name: omrane-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME:-alomrane_db}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - omrane-network

  # 2. Backend API (FastAPI)
  api:
    build: .
    container_name: omrane-api
    # On lance l'API depuis le dossier backend
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DB_HOST: db
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-alomrane_db}
      DB_USER: ${DB_USER:-postgres}
      DB_PASS: ${DB_PASS}
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    networks:
      - omrane-network

  # 3. Frontend Dashboard (Streamlit)
  dashboard:
    build: .
    container_name: omrane-dash
    # On lance le dashboard depuis le dossier frontend
    command: streamlit run frontend/dashboard.py --server.port 8501 --server.address 0.0.0.0
    environment:
      API_BASE_URL: http://api:8000
    volumes:
      - .:/app
    ports:
      - "8501:8501"
    depends_on:
      - api
    networks:
      - omrane-network

networks:
  omrane-network:
    driver: bridge

volumes:
  pgdata:
